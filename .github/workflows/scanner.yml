name: Hourly NSE RSI Scanner

on:
  schedule:
    # 1. Triggers at 10:17 AM IST (04:47 UTC) - Captures 1st hour candle close
    - cron: '47 4 * * 1-5'
    
    # 2. Triggers hourly at 11:17 AM, 12:17 PM, 1:17 PM, 2:17 PM, 3:17 PM IST (05:47 to 09:47 UTC)
    - cron: '47 5-9 * * 1-5'
    
    # 3. Triggers at Market Close at 3:32 PM IST (10:02 UTC) - Captures final short candle data
    - cron: '02 10 * * 1-5'

  workflow_dispatch: # Allows you to manually trigger the scanner at any time

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          pip install yfinance pandas

      - name: Run Scan Script
        run: python scanner.py

      - name: Commit and Save Results back to GitHub
        run: |
          git config --global user.name "RSI Automation Bot"
          git config --global user.email "bot@rsi-pulse.com"
          git add signals.json
          git commit -m "Automated Hourly NSE Signal Refresh" || exit 0
          git push
